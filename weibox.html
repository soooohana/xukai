<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐷 许凯 Weibo - 허개 웨이보 백업</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { max-width: 680px; margin: 0 auto; background-color: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background: #fff; border-bottom: 1px solid #efefef; padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .header h1 span { background: #ff8200; color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; }
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        .top-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .top-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .top-avatar span { font-size: 20px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border: none; }
        .add-btn { width: 36px; height: 36px; border-radius: 50%; background: #ff8200; color: white; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .tabs { display: flex; border-bottom: 1px solid #efefef; background: #fff; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 14px; font-weight: 500; color: #666; cursor: pointer; }
        .tab-btn.active { color: #ff8200; border-bottom: 2px solid #ff8200; }
        .search-bar { display: flex; gap: 8px; align-items: center; background: #f5f5f5; border-radius: 20px; padding: 6px 12px; margin-top: 8px; }
        .search-bar input { flex: 1; border: none; background: none; font-size: 13px; padding: 6px 0; outline: none; }
        .search-bar button { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px; color: #999; }
        .stats { padding: 8px 16px; background: #fafafa; font-size: 12px; color: #666; border-bottom: 1px solid #efefef; display: flex; justify-content: space-between; align-items: center; }
        .sort-btn { background: none; border: 1px solid #ddd; padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; color: #ff8200; }
        .post-card { border-bottom: 1px solid #efefef; padding: 14px; scroll-margin-top: 120px; transition: background 0.3s; }
        .post-card.highlight { background: #fff9e6; }
        .post-header { display: flex; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-user-info h3 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .post-user-info h3 .badge { background: #ff8200; color: white; font-size: 9px; padding: 2px 5px; border-radius: 10px; }
        .post-date { font-size: 10px; color: #999; }
        .post-location { font-size: 10px; color: #999; margin-top: 2px; }
        .post-content { margin-bottom: 12px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
        .post-media { display: grid; gap: 3px; margin-bottom: 12px; border-radius: 10px; overflow: hidden; }
        .post-media.grid-1 { grid-template-columns: 1fr; }
        .post-media.grid-2 { grid-template-columns: repeat(2, 1fr); }
        .post-media.grid-3 { grid-template-columns: repeat(3, 1fr); }
        .post-media-item { background: #f0f0f0; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .post-media.grid-1 .post-media-item { min-height: 200px; max-height: 400px; }
        .post-media-item img, .post-media-item video { max-width: 100%; max-height: 100%; object-fit: contain; }
        .post-media:not(.grid-1) .post-media-item { aspect-ratio: 1; }
        .post-media:not(.grid-1) .post-media-item img, .post-media:not(.grid-1) .post-media-item video { width: 100%; height: 100%; object-fit: cover; }
        .post-actions { display: flex; gap: 16px; padding-top: 10px; border-top: 1px solid #efefef; }
        .action-btn { display: flex; align-items: center; gap: 4px; color: #666; font-size: 12px; background: none; border: none; cursor: pointer; padding: 4px 0; }
        .edit-btn { color: #4caf50; }
        .delete-btn { color: #ff4444; margin-left: auto; }
        .archive-month { margin-bottom: 24px; }
        .archive-month-header { padding: 12px 16px; background: #fafafa; font-size: 14px; font-weight: 600; color: #ff8200; border-bottom: 1px solid #efefef; position: sticky; top: 110px; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); z-index: 10; }
        .archive-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; background: #f0f0f0; }
        .archive-item { aspect-ratio: 1; background: #f0f0f0; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .archive-item img, .archive-item video { width: 100%; height: 100%; object-fit: cover; }
        .archive-item-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; }
        .pagination { display: flex; justify-content: center; gap: 6px; padding: 16px; border-top: 1px solid #efefef; }
        .page-btn { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 18px; cursor: pointer; font-size: 13px; }
        .page-btn.active { background: #ff8200; color: white; border-color: #ff8200; }
        
        /* 모달 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-container { background: white; border-radius: 20px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 14px 18px; border-bottom: 1px solid #efefef; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 16px; font-weight: 600; }
        .modal-close { width: 30px; height: 30px; border-radius: 50%; background: #f0f0f0; border: none; font-size: 18px; cursor: pointer; }
        .modal-body { padding: 18px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 13px; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .file-input-btn { display: inline-block; padding: 8px 14px; background: #efefef; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .media-preview-area { margin-top: 12px; }
        .existing-media-list, .new-media-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; max-height: 180px; overflow-y: auto; }
        .media-preview-item { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; background: #f0f0f0; }
        .media-preview-item img, .media-preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .remove-media-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; }
        .media-filename { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 8px; text-align: center; padding: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .submit-btn { width: 100%; padding: 10px; background: #ff8200; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .cancel-btn { width: 100%; padding: 10px; background: #efefef; color: #666; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .profile-preview { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .profile-preview-img { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; margin-bottom: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .profile-preview-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name-input input { text-align: center; font-size: 14px; font-weight: 600; border: 1px solid #ddd; border-radius: 20px; padding: 8px 16px; width: 200px; }
        .alert-modal { background: white; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .alert-icon { font-size: 40px; padding-top: 20px; }
        .alert-title { font-size: 16px; font-weight: 600; margin: 10px 0 6px; }
        .alert-message { font-size: 13px; color: #666; padding: 0 16px; }
        .alert-files { background: #f5f5f5; margin: 12px 16px; padding: 8px; border-radius: 10px; font-size: 11px; max-height: 120px; overflow-y: auto; text-align: left; }
        .alert-files p { margin: 3px 0; font-size: 10px; }
        .alert-btn { width: 100%; padding: 12px; background: #ff8200; color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; border-radius: 0 0 20px 20px; }
        .image-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; justify-content: center; align-items: center; }
        .image-viewer.active { display: flex; }
        .image-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .image-viewer-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 28px; cursor: pointer; width: 44px; height: 44px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .gallery-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; justify-content: center; align-items: center; }
        .gallery-modal.active { display: flex; }
        .gallery-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 28px; cursor: pointer; width: 44px; height: 44px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .gallery-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; cursor: grab; }
        .gallery-content:active { cursor: grabbing; }
        .gallery-media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .gallery-media { max-width: 90%; max-height: 85vh; object-fit: contain; display: block; margin: 0 auto; pointer-events: auto; }
        .gallery-media video { max-width: 90%; max-height: 85vh; display: block; margin: 0 auto; }
        .gallery-nav { position: absolute; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; top: 50%; transform: translateY(-50%); z-index: 2001; }
        .gallery-prev, .gallery-next { pointer-events: auto; width: 48px; height: 48px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; cursor: pointer; z-index: 2002; }
        .gallery-prev.hidden, .gallery-next.hidden { visibility: hidden; }
        .gallery-counter { position: absolute; bottom: 20px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; color: white; font-size: 12px; z-index: 2002; }
        .backup-modal { background: white; border-radius: 20px; width: 85%; max-width: 360px; }
        .backup-options { display: flex; gap: 10px; padding: 16px; }
        .backup-btn-item { flex: 1; padding: 10px; background: #f5f5f5; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; }
        .backup-btn-item.export { background: #ff8200; color: white; }
        .backup-btn-item.import { background: #4caf50; color: white; }
        .file-input-hidden { display: none; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .upload-progress { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 12px; text-align: center; font-size: 12px; z-index: 2000; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>🐷许凯 Weibo <span>xukai</span></h1>
                <div class="header-buttons">
                    <div class="top-avatar" id="topAvatarBtn"><span>🐣</span></div>
                    <button class="icon-btn" id="backupBtn">💾</button>
                    <button class="add-btn" id="addBtn" style="display: none;">+</button>
                    <button class="icon-btn" id="adminBtn" style="background: #ff8200; color: white;">🔐</button>
                </div>
            </div>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="게시물 검색...">
                <button class="clear-search" id="clearSearchBtn" style="display: none;">✕</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="postsTabBtn">📝 게시물</button>
            <button class="tab-btn" id="archiveTabBtn">📷 보관함</button>
        </div>

        <div id="postsArea">
            <div class="stats" id="stats">
                <span>📊 총 0개</span>
                <button class="sort-btn" id="sortBtn">🔄 최신순 정렬</button>
            </div>
            <div id="postsContainer"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div id="archiveArea" style="display: none;">
            <div id="archiveContainer"></div>
            <div class="pagination" id="archivePagination"></div>
        </div>
    </div>

    <div id="uploadProgress" class="upload-progress">
        ⏳ 파일 업로드 중... <span id="uploadCount">0</span>/<span id="uploadTotal">0</span>
    </div>

    <!-- 모달들 -->
    <div id="postModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="postModalTitle">✨ 새 게시물</h2>
                <button class="modal-close" id="closePostModalBtn">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>📅 날짜</label><input type="date" id="postDate"></div>
                <div class="form-group"><label>📍 위치</label><input type="text" id="postLocation" placeholder="예: 서울, 명동"></div>
                <div class="form-group"><label>✏️ 내용</label><textarea id="postContent" placeholder="게시물 내용..."></textarea></div>
                <div class="form-group">
                    <label>📁 파일 추가</label>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display: none;">
                    <div class="file-input-btn" id="selectFileBtn">+ 파일 선택</div>
                    <div class="media-preview-area" id="existingMediaArea" style="display: none;">
                        <div style="font-size:12px;color:#666;margin:10px 0 5px;">📷 기존 파일</div>
                        <div id="existingMediaList" class="existing-media-list"></div>
                    </div>
                    <div class="media-preview-area" id="newMediaArea" style="display: none;">
                        <div style="font-size:12px;color:#666;margin:10px 0 5px;">🆕 새 파일</div>
                        <div id="newMediaList" class="new-media-list"></div>
                    </div>
                </div>
                <button class="submit-btn" id="savePostBtn">💾 저장하기</button>
                <button class="cancel-btn" id="cancelPostBtn">취소</button>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>🐣 프로필 편집</h2>
                <button class="modal-close" id="closeProfileModalBtn">✕</button>
            </div>
            <div class="modal-body">
                <div class="profile-preview">
                    <div class="profile-preview-img" id="profilePreviewImg"><span>🐣</span></div>
                    <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
                    <div class="profile-name-input"><input type="text" id="profileNameInput" placeholder="닉네임" maxlength="20"></div>
                    <p style="font-size:11px;color:#999;margin-top:12px;">💡 이미지를 클릭하면 변경할 수 있습니다</p>
                </div>
                <button class="submit-btn" id="saveProfileBtn">💾 저장하기</button>
                <button class="cancel-btn" id="cancelProfileBtn">취소</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay">
        <div class="alert-modal">
            <div class="alert-icon" id="alertIcon">✅</div>
            <div class="alert-title" id="alertTitle">완료</div>
            <div class="alert-message" id="alertMessage"></div>
            <div id="alertFilesList" class="alert-files" style="display: none;"></div>
            <button class="alert-btn" id="alertCloseBtn">확인</button>
        </div>
    </div>

    <div id="backupModal" class="modal-overlay">
        <div class="backup-modal">
            <div class="modal-header">
                <h2>💾 데이터 백업</h2>
                <button class="modal-close" id="closeBackupModalBtn">✕</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:12px;font-size:13px;color:#666;">게시물 데이터를 백업/복원합니다.<br>Cloudinary에 저장된 이미지는 별도 관리</p>
                <div class="backup-options">
                    <button class="backup-btn-item export" id="exportBtn">📤 내보내기</button>
                    <button class="backup-btn-item import" id="importBtn">📥 가져오기</button>
                </div>
                <input type="file" id="importFileInput" accept=".json" class="file-input-hidden">
                <button class="cancel-btn" id="cancelBackupBtn" style="margin-top:12px;">취소</button>
            </div>
        </div>
    </div>

    <div id="imageViewer" class="image-viewer">
        <div class="image-viewer-close" id="imageViewerClose">✕</div>
        <img id="imageViewerImg" src="">
    </div>

    <div id="galleryModal" class="gallery-modal">
        <div class="gallery-close" id="galleryCloseBtn">✕</div>
        <div class="gallery-content">
            <div class="gallery-nav">
                <div class="gallery-prev" id="galleryPrevBtn">◀</div>
                <div class="gallery-next" id="galleryNextBtn">▶</div>
            </div>
            <div id="galleryMediaContainer"></div>
        </div>
        <div class="gallery-counter" id="galleryCounter"></div>
    </div>

    <script>
        // ==================== Cloudinary 설정 ====================
        const CLOUDINARY_CLOUD_NAME = "dduysrkk7";  // ← 본인의 cloud name으로 변경하세요!
        const CLOUDINARY_UPLOAD_PRESET = "weibo_upload";
        
        // ==================== 관리자 인증 ====================
        const ADMIN_PASSWORD = "weibo2024";
        
        function isAdmin() {
            return localStorage.getItem("weibo_admin") === "true";
        }
        
        function checkAdmin() {
            if (isAdmin()) return true;
            const input = prompt("🔐 관리자 인증이 필요합니다.\n비밀번호를 입력하세요:");
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem("weibo_admin", "true");
                showAlert("✅ 인증 성공", "관리자 모드로 접속했습니다.\n게시물을 추가/수정/삭제할 수 있습니다.");
                location.reload();
                return true;
            } else if (input !== null) {
                showAlert("⚠️ 인증 실패", "비밀번호가 올바르지 않습니다.", [], true);
                return false;
            }
            return false;
        }
        
        function logout() {
            localStorage.removeItem("weibo_admin");
            showAlert("👋 로그아웃", "관리자 모드가 종료되었습니다.\n페이지를 새로고침합니다.");
            setTimeout(() => location.reload(), 1500);
        }
        
        function updateAdminUI() {
            const admin = isAdmin();
            const addBtn = document.getElementById('addBtn');
            const adminBtn = document.getElementById('adminBtn');
            
            if (admin) {
                if (addBtn) addBtn.style.display = 'flex';
                if (adminBtn) {
                    adminBtn.innerHTML = '🚪';
                    adminBtn.title = '로그아웃';
                    adminBtn.onclick = logout;
                }
            } else {
                if (addBtn) addBtn.style.display = 'none';
                if (adminBtn) {
                    adminBtn.innerHTML = '🔐';
                    adminBtn.title = '관리자 로그인';
                    adminBtn.onclick = () => checkAdmin();
                }
            }
        }
        
        // ==================== 데이터 ====================
        let posts = [];
        let currentPage = 1;
        let archivePage = 1;
        let searchKeyword = '';
        let sortOrder = 'desc';
        let activeTab = 'posts';
        const POSTS_PER_PAGE = 10;
        const ARCHIVE_PER_PAGE = 100;
        
        let currentProfile = {
            name: "허개🐷",
            imagePath: "images/profile.jpg"
        };
        
        const LIKES = 1995;
        const COMMENTS = 305;
        const RETWEETS = 486;
        
        let editingPostId = null;
        let existingMedia = [];
        let newMediaFiles = [];
        let galleryItems = [];
        let galleryIndex = 0;
        let dragStartX = 0;
        let isDragging = false;
        
        // ==================== Cloudinary 업로드 ====================
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) throw new Error('업로드 실패');
                const data = await response.json();
                return {
                    success: true,
                    url: data.secure_url,
                    type: data.resource_type === 'video' ? 'video' : 'image',
                    originalName: file.name
                };
            } catch (error) {
                console.error('Cloudinary 업로드 오류:', error);
                return { success: false, error: error.message };
            }
        }
        
        async function uploadMultipleFiles(files, onProgress) {
            const results = [];
            let completed = 0;
            const total = files.length;
            for (const file of files) {
                if (onProgress) onProgress(completed + 1, total);
                const result = await uploadToCloudinary(file);
                if (result.success) results.push(result);
                completed++;
                if (onProgress) onProgress(completed, total);
            }
            return results;
        }
        
        function showUploadProgress(current, total) {
            const progressDiv = document.getElementById('uploadProgress');
            const currentSpan = document.getElementById('uploadCount');
            const totalSpan = document.getElementById('uploadTotal');
            if (current === 0) {
                progressDiv.style.display = 'block';
                totalSpan.textContent = total;
            }
            currentSpan.textContent = current;
            if (current === total && total > 0) {
                setTimeout(() => { progressDiv.style.display = 'none'; }, 500);
            }
        }
        
        // ==================== 정렬 함수 ====================
        function sortPosts(postsArray) {
            return [...postsArray].sort((a, b) => {
                if (a.date > b.date) return sortOrder === 'desc' ? -1 : 1;
                if (a.date < b.date) return sortOrder === 'desc' ? 1 : -1;
                const timeA = a.createdAt || a.id;
                const timeB = b.createdAt || b.id;
                if (timeA > timeB) return sortOrder === 'desc' ? -1 : 1;
                if (timeA < timeB) return sortOrder === 'desc' ? 1 : -1;
                return 0;
            });
        }
        
        function applySort() {
            posts = sortPosts(posts);
            savePosts();
            if (activeTab === 'posts') renderPosts();
            else renderArchive();
        }
        
        function toggleSort() {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            const text = sortOrder === 'desc' ? '최신순' : '오래된순';
            const sortBtn = document.getElementById('sortBtn');
            if (sortBtn) sortBtn.innerHTML = `🔄 ${text} 정렬`;
            applySort();
        }
        
        // ==================== 데이터 저장/로드 ====================
        function loadData() {
            const saved = localStorage.getItem('weibo_posts_v11');
            if (saved) {
                posts = JSON.parse(saved);
                posts = sortPosts(posts);
            }
            const savedProfile = localStorage.getItem('weibo_current_profile');
            if (savedProfile) currentProfile = JSON.parse(savedProfile);
            updateProfileUI();
            if (activeTab === 'posts') renderPosts();
            else renderArchive();
        }
        
        function savePosts() {
            localStorage.setItem('weibo_posts_v11', JSON.stringify(posts));
        }
        
        function saveCurrentProfile() {
            localStorage.setItem('weibo_current_profile', JSON.stringify(currentProfile));
        }
        
        // ==================== 필터링 ====================
        function getFilteredPosts() {
            let filtered = posts;
            if (searchKeyword) {
                filtered = posts.filter(p => 
                    p.content.toLowerCase().includes(searchKeyword.toLowerCase()) ||
                    (p.location && p.location.toLowerCase().includes(searchKeyword.toLowerCase()))
                );
            }
            return filtered;
        }
        
        // ==================== 렌더링 함수들 ====================
        function formatDate(str) {
            const d = new Date(str);
            return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
        }
        
        function getGridClass(c) {
            if (c === 1) return 'grid-1';
            if (c === 2) return 'grid-2';
            return 'grid-3';
        }
        
        function escapeHtml(t) {
            const div = document.createElement('div');
            div.textContent = t;
            return div.innerHTML;
        }
        
        function scrollToPost(postId) {
            if (activeTab !== 'posts') {
                document.getElementById('postsTabBtn').click();
                setTimeout(() => {
                    const el = document.getElementById(`post-${postId}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        el.classList.add('highlight');
                        setTimeout(() => el.classList.remove('highlight'), 1000);
                    }
                }, 100);
            } else {
                const el = document.getElementById(`post-${postId}`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    el.classList.add('highlight');
                    setTimeout(() => el.classList.remove('highlight'), 1000);
                }
            }
        }
        
        function renderPosts() {
            const filtered = getFilteredPosts();
            const total = filtered.length;
            const totalPages = Math.ceil(total / POSTS_PER_PAGE);
            if (currentPage > totalPages && totalPages) currentPage = totalPages;
            const pagePosts = filtered.slice((currentPage-1)*POSTS_PER_PAGE, currentPage*POSTS_PER_PAGE);
            
            const searchInfo = searchKeyword ? ` (검색: "${searchKeyword}")` : '';
            const sortText = sortOrder === 'desc' ? '최신순' : '오래된순';
            const statsDiv = document.getElementById('stats');
            if (statsDiv) {
                statsDiv.innerHTML = `<span>📊 총 ${total}개${searchInfo}</span><button class="sort-btn" id="sortBtn">🔄 ${sortText} 정렬</button>`;
                document.getElementById('sortBtn').onclick = toggleSort;
            }
            
            const container = document.getElementById('postsContainer');
            if (!container) return;
            
            if (pagePosts.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>${searchKeyword ? '검색 결과 없음' : '게시물이 없습니다'}</p></div>`;
                const pagination = document.getElementById('pagination');
                if (pagination) pagination.innerHTML = '';
                return;
            }
            
            container.innerHTML = pagePosts.map(post => {
                const gridClass = getGridClass(post.media.length);
                const mediaHtml = post.media.length ? `
                    <div class="post-media ${gridClass}">
                        ${post.media.map((m, i) => `
                            <div class="post-media-item" onclick="openGallery(${post.id}, ${i})">
                                ${m.type === 'video' ? `<video src="${m.filePath}" preload="metadata"></video>` : `<img src="${m.filePath}">`}
                            </div>
                        `).join('')}
                    </div>
                ` : '';
                const profileData = post.profile || currentProfile;
                const showEditDelete = isAdmin() ? '' : 'style="display:none"';
                return `
                    <div class="post-card" id="post-${post.id}">
                        <div class="post-header">
                            <div class="post-avatar" onclick="viewProfileImage('${profileData.imagePath}')">
                                <img src="${profileData.imagePath}" onerror="this.style.display='none';this.parentElement.innerHTML='<span>🐣</span>'">
                            </div>
                            <div class="post-user-info">
                                <h3>${escapeHtml(profileData.name)}<span class="badge">💕</span></h3>
                                <div class="post-date">📅 ${formatDate(post.date)}</div>
                                ${post.location ? `<div class="post-location">📍 ${escapeHtml(post.location)}</div>` : ''}
                            </div>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        ${mediaHtml}
                        <div class="post-actions">
                            <button class="action-btn">❤️ ${LIKES.toLocaleString()}</button>
                            <button class="action-btn">💬 ${COMMENTS.toLocaleString()}</button>
                            <button class="action-btn">🔄 ${RETWEETS.toLocaleString()}</button>
                            <button class="action-btn edit-btn" onclick="openPostModal(${post.id})" ${!isAdmin() ? 'style="display:none"' : ''}>✏️</button>
                            <button class="action-btn delete-btn" onclick="deletePost(${post.id})" ${!isAdmin() ? 'style="display:none"' : ''}>🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            let pages = '';
            if (currentPage > 1) pages += `<button class="page-btn" onclick="goToPage(${currentPage-1})">←</button>`;
            for (let i=Math.max(1,currentPage-2); i<=Math.min(totalPages,currentPage+2); i++) {
                pages += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (currentPage < totalPages) pages += `<button class="page-btn" onclick="goToPage(${currentPage+1})">→</button>`;
            const paginationDiv = document.getElementById('pagination');
            if (paginationDiv) paginationDiv.innerHTML = pages;
        }
        
        function goToPage(page) {
            currentPage = page;
            renderPosts();
            window.scrollTo({ top: 0 });
        }
        
        // ==================== 보관함 ====================
        function getArchiveItems() {
            const items = [];
            posts.forEach(post => {
                if (post.media && post.media.length) {
                    post.media.forEach((media, idx) => {
                        items.push({
                            postId: post.id,
                            mediaIndex: idx,
                            date: post.date,
                            year: parseInt(post.date.split('-')[0]),
                            month: parseInt(post.date.split('-')[1]),
                            type: media.type,
                            filePath: media.filePath,
                            fileName: media.fileName
                        });
                    });
                }
            });
            items.sort((a, b) => {
                if (a.date > b.date) return sortOrder === 'desc' ? -1 : 1;
                if (a.date < b.date) return sortOrder === 'desc' ? 1 : -1;
                return 0;
            });
            return items;
        }
        
        function groupByMonth(items) {
            const groups = {};
            items.forEach(item => {
                const key = `${item.year}-${String(item.month).padStart(2,'0')}`;
                if (!groups[key]) groups[key] = { year: item.year, month: item.month, items: [] };
                groups[key].items.push(item);
            });
            return Object.values(groups);
        }
        
        function renderArchive() {
            const allItems = getArchiveItems();
            const totalItems = allItems.length;
            const totalPages = Math.ceil(totalItems / ARCHIVE_PER_PAGE);
            if (archivePage > totalPages && totalPages) archivePage = totalPages;
            const pageItems = allItems.slice((archivePage-1)*ARCHIVE_PER_PAGE, archivePage*ARCHIVE_PER_PAGE);
            const groups = groupByMonth(pageItems);
            const container = document.getElementById('archiveContainer');
            if (!container) return;
            if (totalItems === 0) {
                container.innerHTML = `<div class="empty-state"><div class="emoji">📷</div><p>사진/영상이 없습니다</p></div>`;
                const pagination = document.getElementById('archivePagination');
                if (pagination) pagination.innerHTML = '';
                return;
            }
            container.innerHTML = groups.map(group => `
                <div class="archive-month">
                    <div class="archive-month-header">📅 ${group.year}년 ${group.month}월 (${group.items.length}개)</div>
                    <div class="archive-grid">
                        ${group.items.map(item => `
                            <div class="archive-item" onclick="scrollToPost(${item.postId})">
                                ${item.type === 'video' ? 
                                    `<video src="${item.filePath}" preload="metadata"></video>
                                     <div class="archive-item-badge">🎬</div>` :
                                    `<img src="${item.filePath}">`
                                }
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            let pages = '';
            if (archivePage > 1) pages += `<button class="page-btn" onclick="goToArchivePage(${archivePage-1})">←</button>`;
            for (let i=Math.max(1,archivePage-2); i<=Math.min(totalPages,archivePage+2); i++) {
                pages += `<button class="page-btn ${i===archivePage?'active':''}" onclick="goToArchivePage(${i})">${i}</button>`;
            }
            if (archivePage < totalPages) pages += `<button class="page-btn" onclick="goToArchivePage(${archivePage+1})">→</button>`;
            const paginationDiv = document.getElementById('archivePagination');
            if (paginationDiv) paginationDiv.innerHTML = pages;
        }
        
        function goToArchivePage(page) {
            archivePage = page;
            renderArchive();
            window.scrollTo({ top: 0 });
        }
        
        // ==================== 탭 전환 ====================
        function switchToPosts() {
            activeTab = 'posts';
            document.getElementById('postsTabBtn').classList.add('active');
            document.getElementById('archiveTabBtn').classList.remove('active');
            document.getElementById('postsArea').style.display = 'block';
            document.getElementById('archiveArea').style.display = 'none';
            renderPosts();
        }
        
        function switchToArchive() {
            activeTab = 'archive';
            document.getElementById('archiveTabBtn').classList.add('active');
            document.getElementById('postsTabBtn').classList.remove('active');
            document.getElementById('postsArea').style.display = 'none';
            document.getElementById('archiveArea').style.display = 'block';
            archivePage = 1;
            renderArchive();
        }
        
        // ==================== 게시물 CRUD ====================
        function openPostModal(postId = null) {
            if (!isAdmin()) { checkAdmin(); return; }
            editingPostId = postId;
            newMediaFiles = [];
            if (postId) {
                const post = posts.find(p => p.id === postId);
                if (post) {
                    document.getElementById('postModalTitle').textContent = '✏️ 게시물 수정';
                    document.getElementById('postDate').value = post.date;
                    document.getElementById('postLocation').value = post.location || '';
                    document.getElementById('postContent').value = post.content;
                    existingMedia = [...(post.media || [])];
                    renderExistingMedia();
                    document.getElementById('existingMediaArea').style.display = 'block';
                }
            } else {
                document.getElementById('postModalTitle').textContent = '✨ 새 게시물';
                document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('postLocation').value = '';
                document.getElementById('postContent').value = '';
                existingMedia = [];
                document.getElementById('existingMediaArea').style.display = 'none';
            }
            renderNewMedia();
            document.getElementById('postModal').classList.add('active');
        }
        
        function closePostModal() {
            document.getElementById('postModal').classList.remove('active');
            editingPostId = null;
            existingMedia = [];
            newMediaFiles.forEach(f => { if (f.url) URL.revokeObjectURL(f.url); });
            newMediaFiles = [];
        }
        
        function renderExistingMedia() {
            const container = document.getElementById('existingMediaList');
            if (!container) return;
            container.innerHTML = '';
            existingMedia.forEach((media, idx) => {
                const div = document.createElement('div');
                div.className = 'media-preview-item';
                div.innerHTML = `
                    ${media.type === 'video' ? 
                        `<video src="${media.filePath}" style="width:100%;height:100%;object-fit:cover;"></video>` :
                        `<img src="${media.filePath}" style="width:100%;height:100%;object-fit:cover;">`
                    }
                    <button class="remove-media-btn" data-idx="${idx}">✕</button>
                    <div class="media-filename">${media.fileName.length > 12 ? media.fileName.slice(0,9)+'...' : media.fileName}</div>
                `;
                const removeBtn = div.querySelector('.remove-media-btn');
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    existingMedia.splice(idx, 1);
                    renderExistingMedia();
                };
                container.appendChild(div);
            });
        }
        
        function renderNewMedia() {
            const container = document.getElementById('newMediaList');
            if (!container) return;
            container.innerHTML = '';
            newMediaFiles.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'media-preview-item';
                const isVideo = item.file.type.startsWith('video/');
                div.innerHTML = `
                    ${isVideo ? `<video src="${item.url}" style="width:100%;height:100%;object-fit:cover;"></video>` : `<img src="${item.url}" style="width:100%;height:100%;object-fit:cover;">`}
                    <button class="remove-media-btn" data-idx="${idx}">✕</button>
                    <div class="media-filename">${item.file.name.length > 12 ? item.file.name.slice(0,9)+'...' : item.file.name}</div>
                `;
                const removeBtn = div.querySelector('.remove-media-btn');
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    URL.revokeObjectURL(item.url);
                    newMediaFiles.splice(idx, 1);
                    renderNewMedia();
                };
                container.appendChild(div);
            });
            const area = document.getElementById('newMediaArea');
            if (area) area.style.display = newMediaFiles.length ? 'block' : 'none';
        }
        
        async function savePost() {
            if (!isAdmin()) { checkAdmin(); return; }
            const date = document.getElementById('postDate').value;
            const location = document.getElementById('postLocation').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!date) { showAlert('⚠️ 오류', '날짜를 선택해주세요.'); return; }
            if (!content) { showAlert('⚠️ 오류', '내용을 입력해주세요.'); return; }
            
            const filesToUpload = newMediaFiles.map(item => item.file);
            let uploadedFiles = [];
            if (filesToUpload.length > 0) {
                showUploadProgress(0, filesToUpload.length);
                uploadedFiles = await uploadMultipleFiles(filesToUpload, (c, t) => showUploadProgress(c, t));
            }
            const newMedia = uploadedFiles.map(file => ({
                type: file.type,
                fileName: file.originalName,
                filePath: file.url
            }));
            const finalMedia = [...existingMedia, ...newMedia];
            
            if (editingPostId) {
                const idx = posts.findIndex(p => p.id === editingPostId);
                if (idx !== -1) {
                    posts[idx] = { ...posts[idx], date, location, content, media: finalMedia, updatedAt: new Date().toISOString() };
                    posts = sortPosts(posts);
                    savePosts();
                    closePostModal();
                    if (activeTab === 'posts') renderPosts();
                    else renderArchive();
                    showAlert('✅ 수정 완료', '게시물이 수정되었습니다.');
                }
            } else {
                const newPost = {
                    id: Date.now(), date, location, content,
                    media: finalMedia,
                    profile: { name: currentProfile.name, imagePath: currentProfile.imagePath },
                    createdAt: new Date().toISOString()
                };
                posts.push(newPost);
                posts = sortPosts(posts);
                savePosts();
                closePostModal();
                currentPage = 1;
                if (activeTab === 'posts') renderPosts();
                else renderArchive();
                showAlert('✅ 추가 완료', '게시물이 추가되었습니다.');
            }
            newMediaFiles.forEach(f => { if (f.url) URL.revokeObjectURL(f.url); });
            newMediaFiles = [];
        }
        
        function deletePost(id) {
            if (!isAdmin()) { checkAdmin(); return; }
            if (confirm('삭제하시겠습니까?')) {
                posts = posts.filter(p => p.id !== id);
                posts = sortPosts(posts);
                savePosts();
                if (activeTab === 'posts') renderPosts();
                else renderArchive();
                showAlert('🗑️ 삭제 완료', '게시물이 삭제되었습니다.');
            }
        }
        
        // ==================== 갤러리 ====================
        function openGallery(postId, idx) {
            const post = posts.find(p => p.id === postId);
            if (!post || !post.media.length) return;
            galleryItems = post.media.map((m, i) => ({ ...m, postId }));
            galleryIndex = idx;
            updateGallery();
            document.getElementById('galleryModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            const galleryContent = document.querySelector('.gallery-content');
            if (galleryContent) {
                galleryContent.addEventListener('mousedown', onDragStart);
                window.addEventListener('mousemove', onDragMove);
                window.addEventListener('mouseup', onDragEnd);
            }
        }
        
        function updateGallery() {
            const item = galleryItems[galleryIndex];
            const counter = document.getElementById('galleryCounter');
            if (counter) counter.textContent = `${galleryIndex+1}/${galleryItems.length}`;
            const container = document.getElementById('galleryMediaContainer');
            if (!container) return;
            if (item.type === 'video') {
                container.innerHTML = `<div class="gallery-media-container"><video class="gallery-media" src="${item.filePath}" controls autoplay></video></div>`;
            } else {
                container.innerHTML = `<img class="gallery-media" src="${item.filePath}" onerror="this.src='data:image/svg+xml,%3Csvg...%3E'">`;
            }
            const prevBtn = document.getElementById('galleryPrevBtn');
            const nextBtn = document.getElementById('galleryNextBtn');
            if (prevBtn) {
                if (galleryIndex === 0) prevBtn.classList.add('hidden');
                else prevBtn.classList.remove('hidden');
            }
            if (nextBtn) {
                if (galleryIndex === galleryItems.length - 1) nextBtn.classList.add('hidden');
                else nextBtn.classList.remove('hidden');
            }
        }
        
        function onDragStart(e) { isDragging = true; dragStartX = e.clientX; e.preventDefault(); }
        function onDragMove(e) { if (!isDragging) return; document.body.style.cursor = 'grabbing'; }
        function onDragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            document.body.style.cursor = '';
            const diff = e.clientX - dragStartX;
            if (Math.abs(diff) > 50) diff > 0 ? prevMedia() : nextMedia();
        }
        function nextMedia() { if (galleryIndex < galleryItems.length-1) { galleryIndex++; updateGallery(); } }
        function prevMedia() { if (galleryIndex > 0) { galleryIndex--; updateGallery(); } }
        function closeGallery() {
            document.getElementById('galleryModal').classList.remove('active');
            document.body.style.overflow = '';
            document.body.style.cursor = '';
            const galleryContent = document.querySelector('.gallery-content');
            if (galleryContent) {
                galleryContent.removeEventListener('mousedown', onDragStart);
                window.removeEventListener('mousemove', onDragMove);
                window.removeEventListener('mouseup', onDragEnd);
            }
        }
        
        // ==================== 프로필 ====================
        function updateProfileUI() {
            const nameInput = document.getElementById('profileNameInput');
            if (nameInput) nameInput.value = currentProfile.name;
            const topAvatar = document.querySelector('.top-avatar');
            const profilePreview = document.getElementById('profilePreviewImg');
            const imgHtml = `<img src="${currentProfile.imagePath}" onerror="this.onerror=null;this.parentElement.innerHTML='<span>🐣</span>'">`;
            if (topAvatar) topAvatar.innerHTML = imgHtml;
            if (profilePreview) profilePreview.innerHTML = imgHtml;
        }
        
        function viewProfileImage(path) {

            document.getElementById('imageViewer').classList.add('active');
        }
        
        function showAlert(title, msg, files = [], isError = false) {

            document.getElementById('alertMessage').textContent = msg;

            if (files.length) {
                filesDiv.style.display = 'block';
                filesDiv.innerHTML = files.map(f => `<p>📁 ${f}</p>`).join('');
            } else {
                filesDiv.style.display = 'none';

            document.getElementById('alertModal').classList.add('active');
        }
        
        function closeAlert() {
            document.getElementById('alertModal').classList.remove('active');
        }
        
        // ==================== 검색 ====================
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value;
            const clearBtn = document.getElementById('clearSearchBtn');
            if (clearBtn) clearBtn.style.display = searchKeyword ? 'block' : 'none';
            currentPage = 1;
            if (activeTab === 'posts') renderPosts();
            else renderArchive();
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchKeyword = '';
            const clearBtn = document.getElementById('clearSearchBtn');
            if (clearBtn) clearBtn.style.display = 'none';
            currentPage = 1;
            if (activeTab === 'posts') renderPosts();
            else renderArchive();
        }
        
        // ==================== 백업 ====================
        function exportData() {
            const data = { version: '1.0', exportDate: new Date().toISOString(), posts, currentProfile };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)], {type:'application/json'}));
            a.download = `weibo_backup_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showAlert('✅ 백업 완료', `${posts.length}개 게시물 백업됨`);
        }
        
        function importData(file) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.posts) { posts = sortPosts(data.posts); savePosts(); }
                    if (data.currentProfile) { currentProfile = data.currentProfile; saveCurrentProfile(); updateProfileUI(); }
                    currentPage = 1;
                    if (activeTab === 'posts') renderPosts();
                    else renderArchive();
                    showAlert('✅ 복원 완료', `${posts.length}개 게시물 복원됨`);
                } catch(err) { showAlert('⚠️ 오류', '파일 형식 오류', [], true); }
            };
            reader.readAsText(file);
        }
        
        // ==================== 이벤트 등록 ====================
        document.getElementById('addBtn').onclick = () => openPostModal(null);
        document.getElementById('closePostModalBtn').onclick = closePostModal;
        document.getElementById('cancelPostBtn').onclick = closePostModal;
        document.getElementById('savePostBtn').onclick = savePost;
        document.getElementById('selectFileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                newMediaFiles.push({ file, url: URL.createObjectURL(file) });
            });
            renderNewMedia();
            e.target.value = '';
        };
        
        document.getElementById('topAvatarBtn').onclick = () => document.getElementById('profileModal').classList.add('active');
        document.getElementById('closeProfileModalBtn').onclick = () => document.getElementById('profileModal').classList.remove('active');
        document.getElementById('cancelProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('active');
        document.getElementById('profilePreviewImg').onclick = () => document.getElementById('profileImageInput').click();
        document.getElementById('profileImageInput').onchange = async (e) => {
            if (!isAdmin()) { checkAdmin(); return; }
            if (e.target.files[0]) {
                const file = e.target.files[0];
                showAlert('⏳ 업로드 중', '프로필 이미지를 Cloudinary에 업로드하는 중입니다...');
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                try {
                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    if (!response.ok) throw new Error('업로드 실패');
                    const data = await response.json();
                    currentProfile.imagePath = data.secure_url;
                    updateProfileUI();
                    saveCurrentProfile();
                    showAlert('✅ 프로필 변경 완료', '프로필 이미지가 변경되었습니다.');
                } catch (error) {
                    showAlert('⚠️ 업로드 실패', '프로필 이미지 업로드에 실패했습니다.', [], true);
                }
            }
            e.target.value = '';
        };
        document.getElementById('saveProfileBtn').onclick = () => {
            if (!isAdmin()) { checkAdmin(); return; }
            currentProfile.name = document.getElementById('profileNameInput').value.trim() || "🐼 팬더 배우";
            saveCurrentProfile();
            updateProfileUI();
            document.getElementById('profileModal').classList.remove('active');
            if (activeTab === 'posts') renderPosts();
            else renderArchive();
            showAlert('✅ 프로필 저장', '프로필이 저장되었습니다.');
        };
        
        document.getElementById('alertCloseBtn').onclick = closeAlert;
        
        document.getElementById('backupBtn').onclick = () => document.getElementById('backupModal').classList.add('active');
        document.getElementById('closeBackupModalBtn').onclick = () => document.getElementById('backupModal').classList.remove('active');
        document.getElementById('cancelBackupBtn').onclick = () => document.getElementById('backupModal').classList.remove('active');
        document.getElementById('exportBtn').onclick = () => { exportData(); document.getElementById('backupModal').classList.remove('active'); };
        document.getElementById('importBtn').onclick = () => document.getElementById('importFileInput').click();
        document.getElementById('importFileInput').onchange = (e) => {
            if (e.target.files[0]) { importData(e.target.files[0]); document.getElementById('backupModal').classList.remove('active'); e.target.value = ''; }
        };
        
        document.getElementById('imageViewerClose').onclick = () => document.getElementById('imageViewer').classList.remove('active');
        document.getElementById('imageViewer').onclick = (e) => { if (e.target === document.getElementById('imageViewer')) document.getElementById('imageViewer').classList.remove('active'); };
        
        document.getElementById('galleryCloseBtn').onclick = closeGallery;
        document.getElementById('galleryPrevBtn').onclick = prevMedia;
        document.getElementById('galleryNextBtn').onclick = nextMedia;
        
        let touchStart = 0;
        document.getElementById('galleryModal').addEventListener('touchstart', e => { touchStart = e.changedTouches[0].screenX; });
        document.getElementById('galleryModal').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStart;
            if (Math.abs(diff) > 50) diff > 0 ? prevMedia() : nextMedia();
        });
        
        document.getElementById('postsTabBtn').onclick = switchToPosts;
        document.getElementById('archiveTabBtn').onclick = switchToArchive;
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('clearSearchBtn').onclick = clearSearch;
        
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });
        });
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
                closeGallery();
                document.getElementById('imageViewer').classList.remove('active');
            }
            if (document.getElementById('galleryModal').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevMedia();
                if (e.key === 'ArrowRight') nextMedia();
            }
        });
        
        window.openGallery = openGallery;
        window.deletePost = deletePost;
        window.goToPage = goToPage;
        window.goToArchivePage = goToArchivePage;
        window.openPostModal = openPostModal;
        window.viewProfileImage = viewProfileImage;
        window.scrollToPost = scrollToPost;
        
        // 초기 실행
        loadData();
        updateAdminUI();
        
        // 관리자 아닐 때 수정/삭제 버튼 숨김
        if (!isAdmin()) {
            document.querySelectorAll('.edit-btn, .delete-btn').forEach(btn => {
                if (btn.style) btn.style.display = 'none';
            });
        }
    </script>
</body>
</html>
